<div class="container mt-5">
  <div class="row bg-dark text-white p-4 rounded shadow border border-secondary">
    <div class="col-md-6 d-flex align-items-center justify-content-center">
      <div class="image-container bg-dark-lighter p-2 rounded">
        <img src="https://via.placeholder.com/500x400" class="img-fluid rounded shadow-sm" alt="Auction Item">
      </div>
    </div>

    <div class="col-md-6 px-4">
      <h2 class="text-warning mb-1">Omni Market Auction</h2>
      <p class="text-muted small mb-4">Item UUID: {{ itemId }}</p>

      <div *ngIf="errorMessage" class="alert alert-danger py-2 mb-3">
        <small>{{ errorMessage }}</small>
      </div>

      <div class="card bg-dark border-secondary p-4 mb-4" [class.price-flash]="priceJustChanged">
        <span class="text-muted text-uppercase small">Current High Bid</span>
        <h1 class="text-success display-4 mb-0">${{ currentPrice }}</h1>
        <p class="text-muted mt-2">Status: <span class="badge bg-success">Live Connection</span></p>
      </div>

      <div class="form-group mb-3">
        <label class="mb-2">Your Maximum Bid</label>
        <div class="input-group">
          <span class="input-group-text bg-secondary border-secondary text-white">$</span>
          <input type="number" [(ngModel)]="bidAmount" class="form-control bg-dark text-white border-secondary" placeholder="Enter amount">
        </div>
      </div>

      <button class="btn btn-warning w-100 fw-bold py-3 shadow" (click)="placeBid()" [disabled]="!bidAmount">
        PLACE REAL-TIME BID
      </button>
    </div>
  </div>
</div>
