<div class="dashboard-container p-4">
  <div class="header d-flex justify-content-between align-items-center mb-4">
    <h1 class="text-gold">Live Auctions</h1>
    <span class="badge bg-danger pulse">● LIVE</span>
  </div>

  <div class="row g-4">
    @for (item of items; track item.id) {
      <div class="col-md-4">
        <app-card>
          <div class="auction-card">
            <img [src]="item.imageUrl" class="item-image mb-3" alt="item">
            <h4>{{ item.title }}</h4>
            <p class="text-muted small">{{ item.description }}</p>

            <div class="bid-section d-flex justify-content-between align-items-center p-3 rounded bg-dark-lighter">
              <div>
                <span class="d-block small text-uppercase">Current Bid</span>
                <span class="h4 text-success mb-0">${{ item.currentBid }}</span>
              </div>
              <div class="text-end">
                <span class="d-block small text-muted">High Bidder</span>
                <span class="fw-bold">{{ item.bidderName || 'No bids yet' }}</span>
              </div>
            </div>

            <button class="btn btn-gold w-100 mt-3" [routerLink]="['/bid', item.id]">
              View Details & Bid
            </button>
          </div>
        </app-card>
    </div>
    }
  </div>
</div>
